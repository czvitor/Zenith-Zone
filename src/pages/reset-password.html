<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Senha — ZENITH ZONE</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <a href="../../index.html" class="auth-logo">
        <img src="../images/logo%20curta%20ZZ%20(transparente).png" alt="ZENITH ZONE">
      </a>

      <h1 class="auth-title">Nova Senha</h1>
      <p class="auth-sub">Escolha uma senha forte para sua conta.</p>

      <div class="auth-alert error"   id="alert-error"   hidden></div>
      <div class="auth-alert success" id="alert-success" hidden></div>

      <!-- Token inválido / ausente -->
      <div id="invalid-token" hidden style="text-align:center;padding:1.5rem 0;">
        <p style="color:var(--color-text-muted);font-size:var(--text-sm);margin-bottom:1.2rem;">
          Link inválido ou expirado. Solicite um novo link de recuperação.
        </p>
        <a href="forgot-password.html" class="auth-link">← Voltar para recuperação</a>
      </div>

      <form id="reset-form" novalidate>

        <div class="field">
          <label class="field-label" for="password">Nova Senha</label>
          <div class="field-pass-wrap">
            <input class="field-input" type="password" id="password" name="password"
                   autocomplete="new-password" placeholder="••••••••" required>
            <button type="button" class="toggle-pass" aria-label="Mostrar senha" data-target="password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="pass-strength">
            <div class="pass-bar" id="bar1"></div>
            <div class="pass-bar" id="bar2"></div>
            <div class="pass-bar" id="bar3"></div>
          </div>
          <ul class="pass-rules">
            <li id="rule-len">Mínimo 6 caracteres</li>
            <li id="rule-upper">1 letra maiúscula</li>
            <li id="rule-special">1 caractere especial</li>
          </ul>
          <span class="field-error" id="password-err"></span>
        </div>

        <div class="field">
          <label class="field-label" for="confirmPassword">Confirmar Nova Senha</label>
          <div class="field-pass-wrap">
            <input class="field-input" type="password" id="confirmPassword" name="confirmPassword"
                   autocomplete="new-password" placeholder="••••••••" required>
            <button type="button" class="toggle-pass" aria-label="Mostrar senha" data-target="confirmPassword">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="confirmPassword-err"></span>
        </div>

        <button type="submit" class="btn-auth" id="submit-btn">Redefinir Senha</button>
      </form>

      <p class="auth-footer-text" id="back-link" hidden>
        <a href="login.html" class="auth-link">← Ir para o Login</a>
      </p>

    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Extrair token da URL
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
      document.getElementById('reset-form').hidden   = true;
      document.getElementById('invalid-token').hidden = false;
    }

    const form       = document.getElementById('reset-form');
    const submitBtn  = document.getElementById('submit-btn');
    const passInput  = document.getElementById('password');

    // Toggle ver/ocultar senha
    document.querySelectorAll('.toggle-pass').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.type  = input.type === 'password' ? 'text' : 'password';
      });
    });

    // Indicador de força em tempo real
    passInput.addEventListener('input', () => {
      const val        = passInput.value;
      const hasLen     = val.length >= 6;
      const hasUpper   = /[A-Z]/.test(val);
      const hasSpecial = /[@#$%!&*]/.test(val);

      document.getElementById('rule-len').classList.toggle('ok', hasLen);
      document.getElementById('rule-upper').classList.toggle('ok', hasUpper);
      document.getElementById('rule-special').classList.toggle('ok', hasSpecial);

      const score = [hasLen, hasUpper, hasSpecial].filter(Boolean).length;
      const cls   = score === 1 ? 'weak' : score === 2 ? 'medium' : 'strong';
      ['bar1','bar2','bar3'].forEach((id, i) => {
        const bar = document.getElementById(id);
        bar.className = 'pass-bar';
        if (score > i) bar.classList.add(cls);
      });
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      document.getElementById('alert-error').hidden = true;
      document.getElementById('password-err').textContent        = '';
      document.getElementById('confirmPassword-err').textContent = '';

      const password        = form.password.value;
      const confirmPassword = form.confirmPassword.value;
      let valid = true;

      const passErrors = ZZAuth.validatePassword(password);
      if (passErrors.length) {
        document.getElementById('password-err').textContent = passErrors[0];
        valid = false;
      }
      if (password !== confirmPassword) {
        document.getElementById('confirmPassword-err').textContent = 'As senhas não coincidem.';
        valid = false;
      }
      if (!valid) return;

      submitBtn.disabled    = true;
      submitBtn.textContent = 'Salvando...';

      try {
        const data = await ZZAuth.resetPassword(token, password, confirmPassword);
        document.getElementById('alert-success').textContent = data.message;
        document.getElementById('alert-success').hidden      = false;
        form.hidden = true;
        document.getElementById('back-link').hidden = false;
      } catch (err) {
        const alertError = document.getElementById('alert-error');
        alertError.textContent = err.error || (err.errors?.[0]?.msg) || 'Erro ao redefinir senha.';
        alertError.hidden      = false;
        submitBtn.disabled     = false;
        submitBtn.textContent  = 'Redefinir Senha';
      }
    });
  </script>

</body>
</html>
