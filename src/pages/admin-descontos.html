<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/favico.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descontos e Cupons — ZENITH ZONE Admin</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--color-bg-base); color: var(--color-offwhite); font-family: var(--font-body); min-height: 100vh; padding: 2rem 1rem; }

  /* ── Layout ─── */
  .page-wrap { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }

  /* ── Header ─── */
  .page-head { display: flex; align-items: center; gap: 1rem; justify-content: space-between; }
  .page-head h1 { font-family: var(--font-head); font-weight: var(--fw-black); font-size: clamp(1.4rem,4vw,2rem); text-transform: uppercase; letter-spacing: .08em; color: var(--color-white); }
  .page-head a { font-size: var(--text-xs); color: var(--color-text-muted); text-decoration: none; letter-spacing: .06em; }
  .page-head a:hover { color: var(--color-offwhite); }

  /* ── Abas ─── */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid rgba(245,240,230,.1); }
  .tab-btn { background: none; border: none; color: var(--color-text-muted); font-family: var(--font-head); font-weight: var(--fw-bold); font-size: var(--text-sm); letter-spacing: .06em; text-transform: uppercase; padding: .75rem 1.25rem; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; }
  .tab-btn.active { color: var(--color-white); border-bottom-color: var(--color-red); }
  .tab-btn:hover:not(.active) { color: var(--color-offwhite); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Card ─── */
  .card { background: rgba(7,9,26,.8); border: 1px solid rgba(245,240,230,.06); border-radius: var(--radius-md); overflow: hidden; }
  .card-head { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid rgba(245,240,230,.06); }
  .card-title { font-family: var(--font-head); font-weight: var(--fw-black); font-size: var(--text-base); text-transform: uppercase; letter-spacing: .08em; color: var(--color-white); }
  .card-body { padding: 1.25rem; }

  /* ── Formulário ─── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; }
  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: .35rem; }
  .field label { font-size: var(--text-xs); font-weight: var(--fw-bold); letter-spacing: .08em; text-transform: uppercase; color: var(--color-text-muted); }
  .field input, .field select, .field textarea {
    background: rgba(245,240,230,.05); border: 1px solid rgba(245,240,230,.1);
    border-radius: var(--radius-xs); padding: .6rem .8rem;
    color: var(--color-offwhite); font-family: var(--font-body); font-size: var(--text-sm);
    outline: none; transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: rgba(220,20,60,.5); }
  .field select option { background: #07091a; }
  .field-hint { font-size: var(--text-2xs); color: var(--color-text-muted); }

  /* ── Scope row (aparece conforme scope) ─── */
  #scope-value-wrap { display: none; }

  /* ── Botões ─── */
  .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .6rem 1.2rem; border: none; border-radius: var(--radius-xs); font-family: var(--font-head); font-weight: var(--fw-black); font-size: var(--text-sm); letter-spacing: .06em; text-transform: uppercase; cursor: pointer; transition: background .15s, transform .1s; }
  .btn:hover:not(:disabled) { transform: translateY(-1px); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--color-red); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--color-red-dark); }
  .btn-ghost { background: rgba(245,240,230,.06); color: var(--color-offwhite); border: 1px solid rgba(245,240,230,.1); }
  .btn-danger { background: rgba(220,20,60,.15); color: #f07080; border: 1px solid rgba(220,20,60,.2); }
  .btn-danger:hover:not(:disabled) { background: rgba(220,20,60,.3); }
  .btn-sm { padding: .35rem .75rem; font-size: var(--text-xs); }

  /* ── Tabela ─── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
  th { text-align: left; font-size: var(--text-2xs); font-weight: var(--fw-bold); letter-spacing: .1em; text-transform: uppercase; color: var(--color-text-muted); padding: .6rem .8rem; border-bottom: 1px solid rgba(245,240,230,.06); white-space: nowrap; }
  td { padding: .7rem .8rem; border-bottom: 1px solid rgba(245,240,230,.04); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(245,240,230,.02); }
  .badge { display: inline-block; padding: .15rem .5rem; border-radius: 999px; font-size: var(--text-2xs); font-weight: var(--fw-bold); letter-spacing: .06em; text-transform: uppercase; }
  .badge-green { background: rgba(34,197,94,.12); color: #5dc78c; border: 1px solid rgba(34,197,94,.2); }
  .badge-red   { background: rgba(220,20,60,.12); color: #f07080; border: 1px solid rgba(220,20,60,.2); }
  .badge-gray  { background: rgba(245,240,230,.06); color: var(--color-text-muted); border: 1px solid rgba(245,240,230,.1); }

  /* ── Alert ─── */
  .alert { padding: .75rem 1rem; border-radius: var(--radius-xs); font-size: var(--text-sm); margin-top: .75rem; }
  .alert-error   { background: rgba(220,20,60,.08); border: 1px solid rgba(220,20,60,.2); color: #f07080; }
  .alert-success { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2); color: #5dc78c; }

  /* ── Estado vazio ─── */
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--color-text-muted); font-size: var(--text-sm); }

  /* ── Spinner ─── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; display: inline-block; }

  @media (max-width: 600px) {
    .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; }
    .form-full { grid-column: 1; }
  }
  </style>
</head>
<body>

<div class="page-wrap">

  <!-- Cabeçalho -->
  <div class="page-head">
    <h1>Descontos & Cupons</h1>
    <a href="admin-panel.html">← Painel Admin</a>
  </div>

  <!-- Alerta global -->
  <div id="global-alert" style="display:none"></div>

  <!-- Abas -->
  <div class="tabs">
    <button type="button" class="tab-btn active" data-tab="cupoes">Cupons</button>
    <button type="button" class="tab-btn" data-tab="bxgy">Compre X Leve Y</button>
  </div>

  <!-- ═══════════════ PAINEL: CUPÕES ═══════════════ -->
  <div id="tab-cupoes" class="tab-panel active">
    <div class="card">
      <div class="card-head">
        <span class="card-title">Novo Cupom</span>
        <button type="button" class="btn btn-ghost btn-sm" id="toggle-coupon-form">
          + Criar cupom
        </button>
      </div>

      <!-- Formulário de criação (começa escondido) -->
      <div id="coupon-form-wrap" style="display:none; border-bottom: 1px solid rgba(245,240,230,.06)">
        <div class="card-body">
          <div class="form-grid">
            <div class="field">
              <label for="f-code">Código *</label>
              <input id="f-code" type="text" placeholder="VERAO2026" maxlength="32" style="text-transform:uppercase">
              <span class="field-hint">Letras, números, - ou _</span>
            </div>
            <div class="field">
              <label for="f-discount-type">Tipo de desconto</label>
              <select id="f-discount-type">
                <option value="percentage">Percentagem (%)</option>
                <option value="fixed">Valor fixo (R$)</option>
              </select>
            </div>
            <div class="field">
              <label for="f-discount-value">Valor do desconto *</label>
              <input id="f-discount-value" type="number" min="0" step="0.01" placeholder="15">
            </div>
            <div class="field">
              <label for="f-min-cart">Carrinho mínimo (R$)</label>
              <input id="f-min-cart" type="number" min="0" step="0.01" placeholder="0 = sem mínimo" value="0">
            </div>
          </div>

          <!-- Escopo -->
          <div class="form-grid" style="margin-top:.9rem">
            <div class="field">
              <label for="f-scope">Aplicar em</label>
              <select id="f-scope">
                <option value="global">Todo o catálogo</option>
                <option value="colecao">Coleção específica</option>
                <option value="categoria">Categoria</option>
                <option value="subcategoria">Subcategoria</option>
                <option value="zona">Zona / Segmento</option>
                <option value="produto">Produto específico (ID)</option>
              </select>
            </div>
            <div class="field" id="scope-value-wrap">
              <label for="f-scope-value" id="scope-value-label">Valor do escopo</label>
              <input id="f-scope-value" type="text" placeholder="">
            </div>
          </div>

          <!-- Datas e limites -->
          <div class="form-grid cols-3" style="margin-top:.9rem">
            <div class="field">
              <label for="f-starts">Início (opcional)</label>
              <input id="f-starts" type="datetime-local">
            </div>
            <div class="field">
              <label for="f-expires">Expiração (opcional)</label>
              <input id="f-expires" type="datetime-local">
            </div>
            <div class="field">
              <label for="f-max-uses">Limite total de usos</label>
              <input id="f-max-uses" type="number" min="0" step="1" placeholder="0 = ilimitado" value="0">
            </div>
            <div class="field">
              <label for="f-max-user">Limite por utilizador</label>
              <input id="f-max-user" type="number" min="0" step="1" placeholder="0 = ilimitado" value="0">
            </div>
          </div>

          <div style="display:flex;gap:.75rem;margin-top:1.1rem;align-items:center">
            <button type="button" class="btn btn-primary" id="coupon-save-btn">
              Guardar Cupom
            </button>
            <button type="button" class="btn btn-ghost" id="coupon-cancel-btn">Cancelar</button>
            <div id="coupon-form-alert" style="flex:1"></div>
          </div>
        </div>
      </div>

      <!-- Tabela de cupons -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Desconto</th>
              <th>Escopo</th>
              <th>Validade</th>
              <th>Usos</th>
              <th>Estado</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="coupon-table-body">
            <tr><td colspan="7" class="empty-state">A carregar…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ═══════════════ PAINEL: COMPRE X LEVE Y ═══════════════ -->
  <div id="tab-bxgy" class="tab-panel">
    <div class="card">
      <div class="card-head">
        <span class="card-title">Nova Oferta Progressiva</span>
        <button type="button" class="btn btn-ghost btn-sm" id="toggle-bxgy-form">
          + Criar oferta
        </button>
      </div>

      <!-- Formulário BXGY -->
      <div id="bxgy-form-wrap" style="display:none; border-bottom: 1px solid rgba(245,240,230,.06)">
        <div class="card-body">
          <div class="form-grid">
            <div class="field">
              <label for="b-code">Código da oferta *</label>
              <input id="b-code" type="text" placeholder="COMPRE3LEVE4" maxlength="32" style="text-transform:uppercase">
            </div>
            <div class="field">
              <label for="b-scope">Aplicar em</label>
              <select id="b-scope">
                <option value="global">Todo o catálogo</option>
                <option value="colecao">Coleção específica</option>
                <option value="categoria">Categoria</option>
                <option value="produto">Produto específico (ID)</option>
              </select>
            </div>
            <div class="field" id="b-scope-value-wrap" style="display:none">
              <label for="b-scope-value" id="b-scope-value-label">Valor do escopo</label>
              <input id="b-scope-value" type="text" placeholder="">
            </div>
          </div>

          <div class="form-grid cols-3" style="margin-top:.9rem">
            <div class="field">
              <label for="b-buy">Compre (qtd) *</label>
              <input id="b-buy" type="number" min="1" step="1" value="2">
            </div>
            <div class="field">
              <label for="b-get">Leve de graça (qtd) *</label>
              <input id="b-get" type="number" min="1" step="1" value="1">
            </div>
            <div class="field">
              <label for="b-free-rule">Item gratuito</label>
              <select id="b-free-rule">
                <option value="cheapest">O(s) de menor valor</option>
                <option value="same">Itens idênticos</option>
              </select>
            </div>
          </div>

          <div class="form-grid cols-3" style="margin-top:.9rem">
            <div class="field">
              <label for="b-starts">Início (opcional)</label>
              <input id="b-starts" type="datetime-local">
            </div>
            <div class="field">
              <label for="b-expires">Expiração (opcional)</label>
              <input id="b-expires" type="datetime-local">
            </div>
            <div class="field">
              <label for="b-min-cart">Carrinho mínimo (R$)</label>
              <input id="b-min-cart" type="number" min="0" step="0.01" value="0">
            </div>
          </div>

          <div style="display:flex;gap:.75rem;margin-top:1.1rem;align-items:center">
            <button type="button" class="btn btn-primary" id="bxgy-save-btn">Guardar Oferta</button>
            <button type="button" class="btn btn-ghost" id="bxgy-cancel-btn">Cancelar</button>
            <div id="bxgy-form-alert" style="flex:1"></div>
          </div>
        </div>
      </div>

      <!-- Tabela BXGY -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Promoção</th>
              <th>Escopo</th>
              <th>Validade</th>
              <th>Usos</th>
              <th>Estado</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="bxgy-table-body">
            <tr><td colspan="7" class="empty-state">A carregar…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /page-wrap -->

<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script>
(() => {
  if (!ZZAuth.isLoggedIn() || !ZZAuth.isAdmin()) {
    window.location.href = 'admin-panel.html';
    return;
  }

  const API = window.ZZ_API_BASE || 'http://localhost:3001/api';

  /* ── Utils ──────────────────────────────────────────── */
  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' });
  }
  function showGlobal(msg, type = 'error') {
    const el = document.getElementById('global-alert');
    el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
  }
  function scopeLabel(scope, val) {
    const labels = { global:'Global', colecao:'Coleção', categoria:'Categoria', subcategoria:'Subcategoria', zona:'Zona', produto:'Produto' };
    if (scope === 'global') return 'Global';
    return `${labels[scope] || scope}: ${val || '—'}`;
  }

  /* ── Abas ───────────────────────────────────────────── */
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`)?.classList.add('active');
    });
  });

  /* ══════════════════════════════════════════════════════
     CUPÕES
  ══════════════════════════════════════════════════════ */

  /* Toggle formulário */
  document.getElementById('toggle-coupon-form')?.addEventListener('click', () => {
    const wrap = document.getElementById('coupon-form-wrap');
    wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
  });
  document.getElementById('coupon-cancel-btn')?.addEventListener('click', () => {
    document.getElementById('coupon-form-wrap').style.display = 'none';
    resetCouponForm();
  });

  /* Scope → mostra/esconde campo de valor */
  const scopeEl = document.getElementById('f-scope');
  const scopeValWrap = document.getElementById('scope-value-wrap');
  const scopeValLabel = document.getElementById('scope-value-label');
  const scopeLabels = { colecao:'Nome da coleção', categoria:'ID da categoria', subcategoria:'ID da subcategoria', zona:'ID da zona', produto:'ID do produto' };
  scopeEl?.addEventListener('change', () => {
    const v = scopeEl.value;
    scopeValWrap.style.display = v === 'global' ? 'none' : 'block';
    if (scopeValLabel) scopeValLabel.textContent = scopeLabels[v] || 'Valor';
  });

  function resetCouponForm() {
    ['f-code','f-discount-value','f-min-cart','f-scope-value','f-starts','f-expires'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = id === 'f-min-cart' ? '0' : '';
    });
    document.getElementById('f-discount-type').value = 'percentage';
    document.getElementById('f-scope').value = 'global';
    document.getElementById('f-max-uses').value = '0';
    document.getElementById('f-max-user').value = '0';
    scopeValWrap.style.display = 'none';
    document.getElementById('coupon-form-alert').innerHTML = '';
  }

  /* Guardar cupom */
  document.getElementById('coupon-save-btn')?.addEventListener('click', async () => {
    const alertEl = document.getElementById('coupon-form-alert');
    const btn     = document.getElementById('coupon-save-btn');
    alertEl.innerHTML = '';
    btn.disabled = true;

    const body = {
      code:           (document.getElementById('f-code').value || '').toUpperCase().trim(),
      promoType:      'coupon',
      discountType:   document.getElementById('f-discount-type').value,
      discountValue:  parseFloat(document.getElementById('f-discount-value').value) || 0,
      scope:          document.getElementById('f-scope').value,
      scopeValue:     document.getElementById('f-scope-value').value.trim(),
      minCartValue:   parseFloat(document.getElementById('f-min-cart').value) || 0,
      maxUses:        parseInt(document.getElementById('f-max-uses').value) || 0,
      maxUsesPerUser: parseInt(document.getElementById('f-max-user').value) || 0,
      startsAt:       document.getElementById('f-starts').value || null,
      expiresAt:      document.getElementById('f-expires').value || null,
    };

    if (!body.code)           { alertEl.innerHTML = '<p class="coupon-msg error">Código obrigatório.</p>'; btn.disabled = false; return; }
    if (!body.discountValue)  { alertEl.innerHTML = '<p class="coupon-msg error">Valor do desconto obrigatório.</p>'; btn.disabled = false; return; }

    try {
      const token = ZZAuth.getToken();
      const res   = await fetch(`${API}/coupons`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `Erro ${res.status}`);
      resetCouponForm();
      document.getElementById('coupon-form-wrap').style.display = 'none';
      showGlobal(`Cupom "${data.coupon.code}" criado com sucesso.`, 'success');
      loadCoupons();
    } catch (err) {
      alertEl.innerHTML = `<p class="coupon-msg error">${err.message}</p>`;
    } finally {
      btn.disabled = false;
    }
  });

  /* Carregar e renderizar tabela de cupons */
  async function loadCoupons(promoType = 'coupon') {
    const tbody = document.getElementById(promoType === 'coupon' ? 'coupon-table-body' : 'bxgy-table-body');
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><div class="spin"></div></td></tr>';
    try {
      const token = ZZAuth.getToken();
      const res   = await fetch(`${API}/coupons?promoType=${promoType}&limit=200`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const data  = await res.json();
      if (!res.ok) throw new Error(data.error);
      const coupons = data.coupons;
      if (!coupons.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Nenhuma promoção criada ainda.</td></tr>';
        return;
      }
      tbody.innerHTML = coupons.map(c => {
        const discLabel = promoType === 'coupon'
          ? (c.discountType === 'percentage' ? `${c.discountValue}%` : `R$ ${c.discountValue.toFixed(2)}`)
          : `Compre ${c.buyQty} Leve ${c.buyQty + c.getQty}`;
        const statusBadge = c.active
          ? '<span class="badge badge-green">Activo</span>'
          : '<span class="badge badge-gray">Inactivo</span>';
        const expBadge = c.expiresAt && new Date(c.expiresAt) < new Date()
          ? '<span class="badge badge-red">Expirado</span>' : '';
        const maxStr = c.maxUses ? `${c.usedCount}/${c.maxUses}` : c.usedCount || '0';

        return `<tr data-id="${c._id}">
          <td style="font-family:var(--font-head);font-weight:700;letter-spacing:.06em">${c.code}</td>
          <td>${discLabel}</td>
          <td style="font-size:var(--text-xs);color:var(--color-text-muted)">${scopeLabel(c.scope, c.scopeValue)}</td>
          <td style="font-size:var(--text-xs)">
            ${c.startsAt ? `<span style="color:var(--color-text-muted)">De ${fmtDate(c.startsAt)}</span><br>` : ''}
            ${c.expiresAt ? `<span>Até ${fmtDate(c.expiresAt)}</span>${expBadge}` : '—'}
          </td>
          <td>${maxStr}</td>
          <td>${statusBadge}</td>
          <td>
            <button class="btn btn-sm btn-ghost toggle-active-btn" data-id="${c._id}" data-active="${c.active}">
              ${c.active ? 'Pausar' : 'Activar'}
            </button>
            <button class="btn btn-sm btn-danger delete-btn" data-id="${c._id}" style="margin-left:.35rem">
              Apagar
            </button>
          </td>
        </tr>`;
      }).join('');

      /* Eventos na tabela */
      tbody.querySelectorAll('.toggle-active-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleCoupon(btn.dataset.id, btn.dataset.active === 'true', promoType));
      });
      tbody.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteCoupon(btn.dataset.id, promoType));
      });
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-state" style="color:#f07080">${err.message}</td></tr>`;
    }
  }

  async function toggleCoupon(id, currentActive, promoType) {
    try {
      const token = ZZAuth.getToken();
      const res   = await fetch(`${API}/coupons/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ active: !currentActive }),
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
      loadCoupons(promoType);
    } catch (err) { showGlobal(err.message); }
  }

  async function deleteCoupon(id, promoType) {
    if (!confirm('Apagar este cupom definitivamente?')) return;
    try {
      const token = ZZAuth.getToken();
      const res   = await fetch(`${API}/coupons/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
      showGlobal('Cupom apagado.', 'success');
      loadCoupons(promoType);
    } catch (err) { showGlobal(err.message); }
  }

  /* ══════════════════════════════════════════════════════
     COMPRE X LEVE Y
  ══════════════════════════════════════════════════════ */

  document.getElementById('toggle-bxgy-form')?.addEventListener('click', () => {
    const wrap = document.getElementById('bxgy-form-wrap');
    wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
  });
  document.getElementById('bxgy-cancel-btn')?.addEventListener('click', () => {
    document.getElementById('bxgy-form-wrap').style.display = 'none';
  });

  const bScopeEl = document.getElementById('b-scope');
  const bScopeValWrap = document.getElementById('b-scope-value-wrap');
  const bScopeValLabel = document.getElementById('b-scope-value-label');
  bScopeEl?.addEventListener('change', () => {
    const v = bScopeEl.value;
    bScopeValWrap.style.display = v === 'global' ? 'none' : 'block';
    if (bScopeValLabel) bScopeValLabel.textContent = scopeLabels[v] || 'Valor';
  });

  document.getElementById('bxgy-save-btn')?.addEventListener('click', async () => {
    const alertEl = document.getElementById('bxgy-form-alert');
    const btn     = document.getElementById('bxgy-save-btn');
    alertEl.innerHTML = '';
    btn.disabled = true;

    const body = {
      code:          (document.getElementById('b-code').value || '').toUpperCase().trim(),
      promoType:     'bxgy',
      discountType:  'percentage',
      discountValue: 100,
      buyQty:        parseInt(document.getElementById('b-buy').value) || 2,
      getQty:        parseInt(document.getElementById('b-get').value) || 1,
      freeRule:      document.getElementById('b-free-rule').value,
      scope:         document.getElementById('b-scope').value,
      scopeValue:    (document.getElementById('b-scope-value')?.value || '').trim(),
      minCartValue:  parseFloat(document.getElementById('b-min-cart').value) || 0,
      startsAt:      document.getElementById('b-starts').value || null,
      expiresAt:     document.getElementById('b-expires').value || null,
    };

    if (!body.code) { alertEl.innerHTML = '<p style="color:#f07080;font-size:.8rem">Código obrigatório.</p>'; btn.disabled = false; return; }

    try {
      const token = ZZAuth.getToken();
      const res   = await fetch(`${API}/coupons`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `Erro ${res.status}`);
      document.getElementById('bxgy-form-wrap').style.display = 'none';
      showGlobal(`Oferta "${data.coupon.code}" criada com sucesso.`, 'success');
      loadCoupons('bxgy');
    } catch (err) {
      alertEl.innerHTML = `<p style="color:#f07080;font-size:.8rem">${err.message}</p>`;
    } finally {
      btn.disabled = false;
    }
  });

  /* ── Init ───────────────────────────────────────────── */
  const scopeLabels = { colecao:'Nome da coleção', categoria:'ID da categoria', subcategoria:'ID da subcategoria', zona:'ID da zona', produto:'ID do produto' };
  loadCoupons('coupon');
  loadCoupons('bxgy');

})();
</script>
</body>
</html>
